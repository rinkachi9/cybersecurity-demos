# Google Cloud Workflows: Advanced SOAR Playbook
# This workflow orchestrates the response to a "Leaked Service Account Key" finding.
# It implements a "Human-in-the-Loop" pattern for medium risks and auto-remediation for high risks.

main:
  params: [event]
  steps:
    - init:
        assign:
          - finding: ${json.decode(base64.decode(event.data.message.data))}
          - resource_name: ${finding.finding.resourceName}
          - severity: ${finding.finding.severity}
          - project_id: ${sys.get_env("GOOGLE_CLOUD_PROJECT_ID")}
          - dry_run: ${sys.get_env("SOAR_DRY_RUN") != "false"}
    
    # Step 1: Enrichment (Call a Cloud Function to check key usage logs)
    # Why? We don't want to revoke a key that is actively used in Production unless critical.
    - enrich_finding:
        call: http.post
        args:
          url: ${sys.get_env("ENRICHMENT_FUNCTION_URL")}
          auth:
            type: OIDC
          body:
            resource_name: ${resource_name}
            severity: ${severity}
            active_usage: ${default(finding.active_usage, true)}
            suspicious_source: ${default(finding.suspicious_source, true)}
            source_ip: ${default(finding.source_ip, "203.0.113.5")}
            dry_run: ${dry_run}
        result: enrichment_result

    # Step 2: Decision Logic (The "Brain" of the SOAR)
    - evaluate_risk:
        switch:
          # If high severity AND active malicious usage found -> Auto Remediate
          - condition: ${severity == "CRITICAL" and enrichment_result.body.risk_score > 80}
            next: auto_remediate
          
          # If medium severity -> Create Ticket for Analyst
          - condition: ${severity == "HIGH" or severity == "MEDIUM"}
            next: create_ticket
        
        next: log_false_positive

    # Path A: Automatic Remediation (Disable Key)
    - auto_remediate:
        call: http.post
        args:
          url: ${sys.get_env("REMEDIATION_FUNCTION_URL")}
          auth:
            type: OIDC
          body:
            action: "DISABLE_KEY"
            resource_name: ${resource_name}
            dry_run: ${dry_run}
        result: remediation_status
        next: notify_soc

    # Path B: Human Intervention (Jira/ServiceNow Stub)
    - create_ticket:
        return: "Ticket created for Analyst review. Manual action required."

    # Path C: False Positive
    - log_false_positive:
        return: "Risk score too low. Marking finding as Muted."

    # Final Step: Notification
    - notify_soc:
        return: ${"CRITICAL ALERT: " + resource_name + " remediation path executed. dry_run=" + string(dry_run)}
