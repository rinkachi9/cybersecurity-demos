services:
  owasp-vulnerable:
    build:
      context: .
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      SECURE_MODE: "false"
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 5s
      timeout: 3s
      retries: 12

  owasp-secure:
    build:
      context: .
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      SECURE_MODE: "true"
    ports:
      - "3001:3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 5s
      timeout: 3s
      retries: 12

